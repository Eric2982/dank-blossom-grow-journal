server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve JSON files (manifest.json, assetlinks.json, etc.) with correct content type.
    # Kept separate from the static assets block above to avoid immutable cache headers,
    # since JSON files like manifest.json may change between deployments.
    location ~* \.json$ {
        add_header Content-Type "application/json";
        try_files $uri =404;
    }

    # Proxy /api/ requests to the Base44 backend
    location /api/ {
        proxy_pass https://my-to-do-list-81bfaad7.base44.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host my-to-do-list-81bfaad7.base44.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # All other routes fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
