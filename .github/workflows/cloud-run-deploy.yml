# Deploy to Google Cloud Run and configure custom audiences for OIDC verification.
#
# Required repository secrets:
#   GCP_PROJECT_ID          – Google Cloud project ID
#   GCP_SA_KEY              – JSON key for a service account with the following roles:
#                               roles/run.admin
#                               roles/iam.serviceAccountUser
#                               roles/storage.admin (if pushing to GCR/Artifact Registry)
#   CLOUD_RUN_CUSTOM_AUDIENCE – The audience string(s) to register, e.g.
#                               "https://dankblossominc.com"
#
# Required repository variables (Settings → Variables → Actions):
#   CLOUD_RUN_SERVICE       – Cloud Run service name, e.g. "dank-blossom-app"
#   CLOUD_RUN_REGION        – GCP region, e.g. "us-central1"
#   DOCKER_IMAGE            – Artifact Registry image path, e.g.
#                             "us-central1-docker.pkg.dev/PROJECT/REPO/app"

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Check GCP_SA_KEY is present before attempting authentication.
      #    Sets the 'deploy' output to 'true' only when GCP_SA_KEY is valid.
      #    Outputs a warning and skips deployment when GCP_SA_KEY is absent.
      # -----------------------------------------------------------------------
      - name: Check required secrets
        id: check-secrets
        run: |
          TRIMMED="${GCP_SA_KEY// /}"
          if [ -z "$TRIMMED" ]; then
            echo "WARNING: GCP_SA_KEY secret is not set. Skipping deployment."
            echo "To enable deployment, add the GCP_SA_KEY secret to your repository under"
            echo "Settings → Secrets and variables → Actions → Secrets."
            echo "The value must be the full JSON contents of your Google Cloud service account key file."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          elif [[ "$GCP_SA_KEY" != "{"* ]]; then
            echo "ERROR: GCP_SA_KEY does not appear to be a valid JSON object."
            echo "The value must be the full JSON contents of your Google Cloud service account key file."
            exit 1
          else
            echo "GCP_SA_KEY secret is present and appears to be valid JSON."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      # -----------------------------------------------------------------------
      # 3. Authenticate with Google Cloud using only credentials_json.
      #    Do NOT specify workload_identity_provider at the same time.
      # -----------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        if: steps.check-secrets.outputs.deploy == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: steps.check-secrets.outputs.deploy == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -----------------------------------------------------------------------
      # 4. Build and push Docker image
      # -----------------------------------------------------------------------
      - name: Configure Docker to use gcloud credentials
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          # Extract registry hostname (e.g. us-central1-docker.pkg.dev) from the image path.
          REGISTRY=$(echo "${{ vars.DOCKER_IMAGE }}" | cut -d'/' -f1)
          gcloud auth configure-docker "$REGISTRY" --quiet

      - name: Build Docker image
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          docker build \
            --build-arg VITE_BASE44_APP_ID="${{ secrets.VITE_BASE44_APP_ID }}" \
            --build-arg VITE_BASE44_APP_BASE_URL="${{ secrets.VITE_BASE44_APP_BASE_URL }}" \
            --build-arg VITE_GOOGLE_API_KEY="${{ secrets.VITE_GOOGLE_API_KEY }}" \
            --tag "${{ vars.DOCKER_IMAGE }}:${{ github.sha }}" \
            --tag "${{ vars.DOCKER_IMAGE }}:latest" \
            .

      - name: Push Docker image
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          docker push "${{ vars.DOCKER_IMAGE }}:${{ github.sha }}"
          docker push "${{ vars.DOCKER_IMAGE }}:latest"

      # -----------------------------------------------------------------------
      # 5. Deploy to Cloud Run
      # -----------------------------------------------------------------------
      - name: Deploy to Cloud Run
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image "${{ vars.DOCKER_IMAGE }}:${{ github.sha }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --platform managed \
            --quiet

      # -----------------------------------------------------------------------
      # 6. Set custom audience(s) on the service
      #
      #    gcloud run services update SERVICE --add-custom-audiences=AUDIENCE
      #
      #    This registers the given string as an accepted value for the `aud`
      #    claim in OIDC ID tokens presented to the service.  Any service
      #    account that needs to call this Cloud Run service must obtain an ID
      #    token with this audience.
      # -----------------------------------------------------------------------
      - name: Set custom audience on Cloud Run service
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          gcloud run services update "${{ vars.CLOUD_RUN_SERVICE }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --platform managed \
            --add-custom-audiences="${{ secrets.CLOUD_RUN_CUSTOM_AUDIENCE }}" \
            --quiet

      # -----------------------------------------------------------------------
      # 7. Verify the custom audience is configured
      #
      #    Reads back the service description and confirms the expected audience
      #    string appears in the custom-audiences list.  The step fails if it
      #    is missing, providing early detection of configuration drift.
      # -----------------------------------------------------------------------
      - name: Verify custom audience is configured
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          AUDIENCE="${{ secrets.CLOUD_RUN_CUSTOM_AUDIENCE }}"
          echo "Expected audience: $AUDIENCE"

          CONFIGURED=$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --platform managed \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/custom-audiences'])")

          echo "Configured audiences: $CONFIGURED"

          if echo "$CONFIGURED" | grep -qF "$AUDIENCE"; then
            echo "✅ Custom audience '$AUDIENCE' is correctly configured."
          else
            echo "❌ Custom audience '$AUDIENCE' was NOT found in the service configuration."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 8. Print the service URL
      # -----------------------------------------------------------------------
      - name: Get Cloud Run service URL
        if: steps.check-secrets.outputs.deploy == 'true'
        run: |
          gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --region "${{ vars.CLOUD_RUN_REGION }}" \
            --platform managed \
            --format="value(status.url)"
