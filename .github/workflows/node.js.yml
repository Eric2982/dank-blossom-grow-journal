# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        # Node 18.x removed: undici@7.18.2 and wrangler@4.72.0 require Node >=20

    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
    - uses: actions/checkout@v4
    - name: Verify GITHUB_ACTOR
      run: |
        if [ -z "$GITHUB_ACTOR" ]; then
          echo "ERROR: GITHUB_ACTOR is not set"
          exit 1
        fi
        echo "GITHUB_ACTOR is set to: $GITHUB_ACTOR"
      env:
        GITHUB_ACTOR: ${{ github.actor }}
    - name: Verify GITHUB_TOKEN
      run: |
        if [ -z "$GITHUB_TOKEN" ]; then
          echo "WARNING: GITHUB_TOKEN is not set"
        else
          echo "GITHUB_TOKEN is set and recognized"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Log commit SHA
      run: echo "Running CI on commit ${{ github.sha }} (ref ${{ github.ref }})"
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - name: Validate wrangler deployment configuration
      run: npx wrangler deploy --dry-run --outdir /tmp/wrangler-dry
    - run: npm test
